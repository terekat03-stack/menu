<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню и рецепты</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#faf8f4;color:#2c2a26;min-height:100vh}
header{background:#3b6d11;color:white;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:600}
header p{font-size:13px;opacity:.8;margin-top:3px}
.hbtn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;background:white;color:#3b6d11;transition:.2s}
.hbtn:hover{background:#eaf3de}
nav{display:flex;background:white;border-bottom:1px solid #e0ddd6;padding:0 32px;overflow-x:auto}
.nav-tab{padding:13px 18px;cursor:pointer;font-size:14px;font-weight:600;color:#888780;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.nav-tab.active{color:#3b6d11;border-bottom-color:#3b6d11}
.nav-tab:hover:not(.active){color:#444}
.container{max-width:1200px;margin:0 auto;padding:28px 24px}
.section{display:none}.section.active{display:block}

.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.week-title{font-family:'Playfair Display',serif;font-size:21px}
.week-nav{display:flex;gap:8px}
.wbtn{padding:7px 14px;border:1.5px solid #c0dd97;border-radius:8px;background:white;cursor:pointer;font-size:13px;color:#3b6d11;font-weight:600}
.wbtn:hover{background:#eaf3de}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.day-card{background:white;border-radius:12px;border:1px solid #e0ddd6;overflow:hidden}
.day-name{background:#3b6d11;color:white;padding:9px 14px;font-size:12px;font-weight:600;letter-spacing:.5px}
.day-meals{padding:10px}
.meal-slot{margin-bottom:9px}
.meal-label{font-size:10px;color:#888780;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meal-label.b{color:#ba7517}
.meal-select{width:100%;padding:6px 9px;border:1px solid #e0ddd6;border-radius:7px;font-family:'Nunito',sans-serif;font-size:12px;color:#2c2a26;background:#faf8f4;cursor:pointer}
.meal-select:focus{outline:none;border-color:#639922}
.meal-select.bsel{border-color:#fac775;background:#fffbf0}
.shop-bar{background:#eaf3de;border:1px solid #c0dd97;border-radius:12px;padding:14px 18px;margin-top:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.shop-bar p{font-size:13px;color:#27500a}
.gbtn{background:#3b6d11;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600}
.gbtn:hover{background:#27500a}

.toolbar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;padding:10px 14px;border:1.5px solid #e0ddd6;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;background:white}
.srch:focus{outline:none;border-color:#639922}
.fsel{padding:10px 12px;border:1.5px solid #e0ddd6;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;background:white;cursor:pointer}
.abtn{padding:10px 18px;background:#3b6d11;color:white;border:none;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;white-space:nowrap}
.abtn:hover{background:#27500a}
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.rc{background:white;border-radius:14px;border:1px solid #e0ddd6;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.rc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
.rc-emoji{font-size:44px;text-align:center;padding:22px;background:#f4f1eb}
.rc-info{padding:14px}
.rc-name{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:6px}
.rc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:#eaf3de;color:#3b6d11}
.tag.soup{background:#e6f1fb;color:#185fa5}
.tag.meat{background:#faece7;color:#993c1d}
.tag.salad{background:#eaf3de;color:#3b6d11}
.tag.baking{background:#faeeda;color:#854f0b}
.tag.pasta{background:#fbeaf0;color:#993556}
.tag.breakfast{background:#faeeda;color:#ba7517}
.tag.other{background:#f1efe8;color:#5f5e5a}
.rc-desc{font-size:12px;color:#888780;line-height:1.5}
.card-btns{display:flex;gap:8px;margin-top:12px}
.cbtn{padding:5px 12px;border:1.5px solid #c0dd97;border-radius:7px;font-size:11px;color:#3b6d11;font-weight:600;cursor:pointer;background:transparent;font-family:'Nunito',sans-serif}
.cbtn:hover{background:#eaf3de}
.cbtn.d{border-color:#f0959578;color:#a32d2d}
.cbtn.d:hover{background:#fcebeb}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;max-width:700px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.mhdr{background:#3b6d11;color:white;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1;border-radius:16px 16px 0 0}
.mtitle{font-family:'Playfair Display',serif;font-size:19px}
.mclose{background:rgba(255,255,255,.2);border:none;color:white;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mbody{padding:22px;flex:1}
.mfooter{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid #e0ddd6;position:sticky;bottom:0;background:white;border-radius:0 0 16px 16px}

.stitle{font-family:'Playfair Display',serif;font-size:14px;color:#3b6d11;margin:18px 0 8px;border-bottom:1.5px solid #eaf3de;padding-bottom:5px}
.ilist{list-style:none}
.ilist li{padding:6px 0;border-bottom:1px solid #f4f1eb;font-size:13px;display:flex;align-items:center;gap:8px}
.ilist li::before{content:'•';color:#639922;font-size:16px}
.slist{list-style:none;counter-reset:st}
.slist li{counter-increment:st;padding:9px 0;border-bottom:1px solid #f4f1eb;font-size:13px;line-height:1.6;display:flex;gap:10px}
.slist li::before{content:counter(st);background:#3b6d11;color:white;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.hint{margin-top:14px;padding:10px 14px;background:#faf8f4;border-radius:9px;font-size:12px;color:#888780}

.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.egrid.full{grid-template-columns:1fr}
.flabel{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.efield{width:100%;padding:9px 12px;border:1.5px solid #e0ddd6;border-radius:9px;font-family:'Nunito',sans-serif;font-size:13px;color:#2c2a26;background:#faf8f4;resize:vertical}
.efield:focus{outline:none;border-color:#639922}
.emojif{font-size:22px;text-align:center;max-width:70px}
.eli{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f4f1eb}
.eli input,.eli textarea{flex:1;padding:6px 10px;border:1px solid #e0ddd6;border-radius:7px;font-family:'Nunito',sans-serif;font-size:13px}
.eli textarea{resize:vertical;min-height:40px}
.eli input:focus,.eli textarea:focus{outline:none;border-color:#639922}
.delbtn{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;line-height:1;padding:0 4px;flex-shrink:0}
.delbtn:hover{color:#a32d2d}
.addrow{display:flex;gap:8px;margin-top:8px}
.addrow input,.addrow textarea{flex:1;padding:8px 12px;border:1.5px dashed #c0dd97;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;background:white}
.addrow input:focus,.addrow textarea:focus{outline:none;border-color:#639922;border-style:solid}
.addrow textarea{resize:vertical;min-height:40px}
.ardbtn{padding:8px 14px;background:#eaf3de;color:#3b6d11;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:'Nunito',sans-serif}
.ardbtn:hover{background:#c0dd97}

.sbtn{background:#3b6d11;color:white;border:none;padding:9px 20px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.sbtn:hover{background:#27500a}
.cancbtn{background:white;color:#888780;border:1.5px solid #e0ddd6;padding:9px 20px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.cancbtn:hover{background:#faf8f4}

.shopcat{background:white;border-radius:12px;border:1px solid #e0ddd6;overflow:hidden;margin-bottom:12px}
.scathdr{background:#eaf3de;padding:9px 14px;font-weight:600;font-size:13px;color:#27500a}
.sitems{padding:6px 14px}
.sitem{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f4f1eb;font-size:13px}
.sitem:last-child{border-bottom:none}
.sitem input[type=checkbox]{width:15px;height:15px;accent-color:#3b6d11;cursor:pointer;flex-shrink:0}
.sitem label{cursor:pointer;flex:1}
.sitem label.done{text-decoration:line-through;color:#aaa}
.asrow{display:flex;gap:8px;padding:10px 0 4px}
.asin{flex:1;padding:7px 10px;border:1px solid #e0ddd6;border-radius:7px;font-family:'Nunito',sans-serif;font-size:12px}
.asbtn{padding:7px 12px;background:#3b6d11;color:white;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}

@media(max-width:600px){
  header{padding:12px 14px;gap:8px}
  header h1{font-size:20px}
  .hbtn{display:none}
  nav{padding:0 8px}
  .nav-tab{padding:12px 14px;font-size:13px}
  .container{padding:12px 10px}
  .week-header{margin-bottom:14px}
  .week-title{font-size:18px}
  .wbtn{padding:9px 14px;font-size:13px}
  .day-grid{grid-template-columns:1fr;gap:10px}
  .day-name{font-size:13px;padding:10px 14px}
  .meal-label{font-size:11px}
  .meal-select{font-size:14px;padding:9px 10px}
  .shop-bar{flex-direction:column;align-items:stretch;text-align:center}
  .shop-bar p{font-size:13px}
  .gbtn{width:100%;padding:12px}
  .toolbar{flex-direction:column;gap:8px}
  .srch{min-width:unset;width:100%;font-size:15px;padding:12px 14px}
  .fsel{width:100%;font-size:14px;padding:12px}
  .abtn{width:100%;padding:12px;font-size:14px}
  .recipes-grid{grid-template-columns:1fr;gap:14px}
  .rc-emoji{font-size:40px;padding:18px}
  .rc-name{font-size:15px}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:92vh}
  .mhdr{border-radius:20px 20px 0 0;padding:16px 18px}
  .mtitle{font-size:17px}
  .mbody{padding:16px}
  .mfooter{padding:12px 16px;gap:8px}
  .sbtn,.cancbtn{flex:1;padding:12px;font-size:14px;text-align:center}
  .egrid{grid-template-columns:1fr}
  .egrid.full{grid-template-columns:1fr}
  .efield{font-size:15px;padding:11px 12px}
  .eli input,.eli textarea{font-size:15px}
  .addrow input,.addrow textarea{font-size:14px}
  .ardbtn{padding:10px 14px;font-size:13px}
  .asin{font-size:14px;padding:9px 10px}
  .asbtn{font-size:13px;padding:9px 12px}
  .sitem{padding:9px 0}
  .sitem input[type=checkbox]{width:18px;height:18px}
  .cbtn{padding:8px 14px;font-size:12px}
  .stitle{font-size:15px}
  .ilist li,.slist li{font-size:14px}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>🍽 Моя кулинарная книга</h1>
    <p>Меню · Рецепты · Список покупок</p>
  </div>
  <button class="hbtn" onclick="window.print()">🖨 Распечатать</button>
</header>

<nav>
  <div class="nav-tab active" onclick="showSection('menu',this)">📅 Меню</div>
  <div class="nav-tab" onclick="showSection('recipes',this)">📖 Рецепты</div>
  <div class="nav-tab" onclick="showSection('shopping',this)">🛒 Покупки</div>
</nav>

<div class="container">
  <div id="section-menu" class="section active">
    <div class="week-header">
      <div>
        <div class="week-title" id="week-label">Неделя 1</div>
        <p style="font-size:12px;color:#888780;margin-top:2px">☀️ Завтрак · 🍲 Обед · 🌙 Ужин для каждого дня</p>
      </div>
      <div class="week-nav">
        <button class="wbtn" onclick="changeWeek(-1)">← Пред.</button>
        <button class="wbtn" onclick="changeWeek(1)">След. →</button>
      </div>
    </div>
    <div class="day-grid" id="day-grid"></div>
    <div class="shop-bar">
      <p>Выбрали блюда? Составь список покупок →</p>
      <button class="gbtn" onclick="buildShoppingList()">🛒 Составить список</button>
    </div>
  </div>

  <div id="section-recipes" class="section">
    <div class="toolbar">
      <input class="srch" type="text" placeholder="🔍 Поиск рецепта..." id="search-input" oninput="filterRecipes()">
      <select class="fsel" id="filter-cat" onchange="filterRecipes()">
        <option value="">Все категории</option>
        <option value="breakfast">☀️ Завтраки</option>
        <option value="soup">🍲 Супы</option>
        <option value="meat">🥩 Мясо</option>
        <option value="salad">🥗 Салаты</option>
        <option value="pasta">🍝 Паста/Крупы</option>
        <option value="baking">🥐 Выпечка</option>
        <option value="other">🍽 Другое</option>
      </select>
      <button class="abtn" onclick="openAddRecipe()">+ Новый рецепт</button>
    </div>
    <div class="recipes-grid" id="recipes-grid"></div>
  </div>

  <div id="section-shopping" class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:21px">Список покупок</div>
        <p style="font-size:12px;color:#888780;margin-top:2px">Отмечайте купленные продукты</p>
      </div>
      <button class="gbtn" onclick="clearChecked()">Удалить отмеченные</button>
    </div>
    <div id="shopping-list-content">
      <p style="color:#888780;font-size:13px">Перейдите в «Меню», выберите блюда и нажмите «Составить список».</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" id="modal-title">Рецепт</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mfooter" id="modal-footer"></div>
  </div>
</div>

<script>
const DAYS=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
let nextId=200;

const RECIPES=[
  {id:1,name:'Овсяная каша',emoji:'🥣',cat:'breakfast',desc:'Классическая овсянка с фруктами и мёдом',
   ingredients:['100г овсяных хлопьев','300мл молока или воды','1 ст.л. мёда','Фрукты и ягоды по вкусу','Щепотка соли'],
   steps:['Молоко довести до кипения, посолить.','Засыпать хлопья, варить 5–7 мин помешивая.','Снять с огня, добавить мёд.','Подавать с фруктами и ягодами.']},
  {id:2,name:'Сырники',emoji:'🫓',cat:'breakfast',desc:'Воздушные творожные сырники 🌸',
   ingredients:['500г творога','2 яйца','4 ст.л. сахара','5 ст.л. муки','Ванилин, щепотка соли'],
   steps:['Творог размять, добавить яйца, сахар, ванилин, соль.','Добавить муку, замесить мягкое тесто.','Сформировать сырники, обвалять в муке.','Жарить на масле по 3–4 мин с каждой стороны.','Подавать со сметаной или вареньем.']},
  {id:3,name:'Блины с ветчиной и сыром',emoji:'🥞',cat:'breakfast',desc:'Тонкие блины с пикантной начинкой',
   ingredients:['2 яйца','500мл молока','200г муки','2 ст.л. растительного масла','Соль, сахар','150г ветчины','100г твёрдого сыра'],
   steps:['Взбить яйца с молоком, добавить муку, масло, соль и сахар. Дать постоять 20 мин.','Жарить тонкие блины с двух сторон.','На каждый блин выложить ветчину и тёртый сыр.','Завернуть конвертиком или трубочкой.']},
  {id:4,name:'Блины с курицей и грибами',emoji:'🥞',cat:'breakfast',desc:'Блины с сытной грибной начинкой',
   ingredients:['2 яйца','500мл молока','200г муки','Масло, соль','300г куриного филе','200г шампиньонов','1 луковица','3 ст.л. сметаны'],
   steps:['Испечь тонкие блины.','Курицу и грибы обжарить с луком.','Добавить сметану, потушить 5 мин, посолить.','Выложить начинку на блин, завернуть конвертиком.']},
  {id:5,name:'Вафли',emoji:'🧇',cat:'breakfast',desc:'Хрустящие домашние вафли',
   ingredients:['2 яйца','250мл молока','200г муки','100г сливочного масла (растопить)','2 ст.л. сахара','1 ч.л. разрыхлителя','Щепотка соли'],
   steps:['Взбить яйца с сахаром.','Добавить молоко, растопленное масло.','Добавить муку с разрыхлителем, замесить без комков.','Выпекать в вафельнице.','Подавать с мёдом или джемом.']},
  {id:6,name:'Яичница с овощами',emoji:'🍳',cat:'breakfast',desc:'Быстрая и сытная яичница',
   ingredients:['3–4 яйца','1 помидор','½ болгарского перца','Зелёный лук','Соль, перец','Растительное масло'],
   steps:['Овощи нарезать, обжарить на масле 3 мин.','Вбить яйца, не перемешивать.','Накрыть крышкой, готовить 3–4 мин.','Посолить, поперчить, посыпать луком.']},
  {id:7,name:'Тосты с авокадо',emoji:'🥑',cat:'breakfast',desc:'Питательный завтрак с авокадо',
   ingredients:['2 кусочка хлеба','1 авокадо','1 яйцо (пашот или глазунья)','Лимонный сок, соль, перец','Помидоры черри, зелень'],
   steps:['Хлеб поджарить в тостере.','Авокадо размять с лимоном, солью и перцем.','Намазать авокадо на тост.','Положить яйцо сверху. Украсить черри и зеленью.']},
  {id:8,name:'Омлет с сыром',emoji:'🍳',cat:'breakfast',desc:'Пышный французский омлет',
   ingredients:['3 яйца','50мл молока','50г твёрдого сыра','Соль, перец','Сливочное масло','Зелень'],
   steps:['Яйца взбить с молоком, солью и перцем.','Разогреть сковороду со сливочным маслом.','Вылить яичную смесь, готовить на среднем огне.','Когда схватится, посыпать тёртым сыром.','Свернуть пополам. Посыпать зеленью.']},
  {id:9,name:'Каша гречневая',emoji:'🌾',cat:'breakfast',desc:'Полезная гречка с маслом',
   ingredients:['200г гречки','400мл воды','1 ч.л. соли','2 ст.л. сливочного масла'],
   steps:['Гречку промыть, залить водой 1:2.','Довести до кипения, посолить.','Убавить огонь, накрыть крышкой, варить 15–20 мин.','Добавить масло, перемешать.']},

   steps:['Яйца взбить с сахаром добела.','Добавить сгущёнку и сметану (с погашенной содой), муку с какао.','Испечь 2 коржа при 180°C 30 мин.','Взбить сметану с сахаром для крема.','Пропитать остывшие коржи кремом.','Сварить глазурь, нагревая компоненты до загустения.','Облить торт глазурью.']},
  {id:45,name:'Тортилья-бургер',emoji:'🌯',cat:'other',desc:'Хрустящий бургер из тортильи с говядиной',
   ingredients:['4 тортильи','500г говядины (фарш)','2 маринованных огурца','1 помидор','1 луковица','12 квадратиков бургерного сыра','Сливочное масло 4 кубика','Соль, перец, сушёный чеснок','Маринад: уксус, соль, сахар, кипяток'],
   steps:['Фарш смешать с солью, перцем, сушёным чесноком.','Лук замариновать, дать остыть.','Фарш тонко распределить по тортилье, прижарить 5 мин.','Перевернуть, накрыв тарелкой.','Выложить начинку, сыр, масло.','Обжарить с обеих сторон до хрустящей корочки.']},
  {id:46,name:'Жульен',emoji:'🫕',cat:'other',desc:'Запечённые грибы с курицей в сливочном соусе',
   ingredients:['300г куриного филе','300г шампиньонов','1 луковица','200мл сливок 20%','3 ст.л. муки','100г твёрдого сыра','Соль, перец, сливочное масло'],
   steps:['Курицу отварить, нарезать кубиком.','Лук и грибы обжарить на сливочном масле.','Добавить муку, влить сливки. Тушить до загустения 5 мин.','Добавить курицу, посолить, поперчить.','Разложить по кокотницам, посыпать тёртым сыром.','Запечь при 200°C 15–20 мин.']},
  {id:47,name:'Лазанья',emoji:'🍝',cat:'other',desc:'Итальянская лазанья с мясным соусом',
   ingredients:['Листы лазаньи (готовые)','500г фарша','1 луковица, 2 зубчика чеснока','400мл томатного соуса','Бешамель: 50г масла, 50г муки, 500мл молока, соль','150г сыра'],
   steps:['Обжарить фарш с луком и чесноком. Добавить томатный соус, тушить 15 мин.','Бешамель: растопить масло, добавить муку, влить молоко, варить мешая до загустения.','Форму смазать. Выкладывать слоями: соус — листы — фарш — бешамель.','Повторить 3–4 раза. Верхний слой — бешамель и сыр.','Запечь при 180°C 35–40 мин.']},
];

const SHOPPING_DB={
  'Мясо и рыба':['говядина','свинина','курица','курицы','куриного','фарш','индейки','баранина','лосось','тунец','красная рыба','сёмга','купаты','бекон','ветчина'],
  'Молочные':['молоко','сметана','сливки','сыр','пармезан','фета','моцарелла','творог','масло','кефир','сгущёнка','йогурт'],
  'Овощи':['помидор','огурец','лук','морковь','картофель','капуста','перец','свёкла','чеснок','зелень','укроп','петрушка','авокадо','баклажан','кабачок','горошек'],
  'Крупы и паста':['рис','гречка','макароны','спагетти','паста','вермишель','овсяных','гречневый','гранола'],
  'Яйца':['яйца','яйцо','желток'],
  'Хлеб и выпечка':['мука','хлеб','тортилья','лаваш','сухари','кунжут','разрыхлитель','дрожжи'],
  'Специи и соусы':['соль','перец','паприка','зира','корица','какао','ванилин','соевый','уксус','томатная паста','майонез','мёд'],
};

let currentWeek=1;
const totalWeeks=4;
const menuData={};
let currentRecipeId=null;

function saveToStorage(){
  try{
    localStorage.setItem('menu_recipes',JSON.stringify(RECIPES));
    localStorage.setItem('menu_data',JSON.stringify(menuData));
    localStorage.setItem('menu_nextid',String(nextId));
  }catch(e){}
}

function loadFromStorage(){
  try{
    const sr=localStorage.getItem('menu_recipes');
    const sm=localStorage.getItem('menu_data');
    const sn=localStorage.getItem('menu_nextid');
    if(sr){const r=JSON.parse(sr);RECIPES.length=0;r.forEach(x=>RECIPES.push(x));}
    if(sn){nextId=parseInt(sn)||200;}
    return sm?JSON.parse(sm):null;
  }catch(e){return null;}
}

function initMenuData(){
  for(let w=1;w<=totalWeeks;w++){
    menuData[w]={};
    DAYS.forEach(d=>{menuData[w][d]={breakfast:'',lunch:'',dinner:''};});
  }
  const saved=loadFromStorage();
  if(saved){
    Object.keys(saved).forEach(w=>{
      if(menuData[w])Object.keys(saved[w]).forEach(d=>{
        if(menuData[w][d])Object.assign(menuData[w][d],saved[w][d]);
      });
    });
  } else {
    const sug=[
      ['Овсяная каша','Борщ','Курица в сметане/сливках'],
      ['Омлет с сыром','Норвежский суп','Паста с курицей и грибами'],
      ['Сырники','Суп с фрикадельками','Плов'],
      ['Тосты с авокадо','Гречневый суп','Гуляш'],
      ['Яичница с овощами','Жульен','Карбонара'],
      ['Вафли','Окрошка','Тортилья-бургер'],
      ['Каша гречневая','','Блины с курицей и грибами'],
    ];
    DAYS.forEach((d,i)=>{menuData[1][d]={breakfast:sug[i][0],lunch:sug[i][1],dinner:sug[i][2]};});
  }
}

function buildOptions(sel=''){
  return '<option value="">— выбрать —</option>'+
    RECIPES.map(r=>`<option value="${r.name}"${r.name===sel?' selected':''}>${r.emoji} ${r.name}</option>`).join('');
}

function renderMenu(){
  document.getElementById('week-label').textContent=`Неделя ${currentWeek}`;
  document.getElementById('day-grid').innerHTML=DAYS.map(day=>{
    const m=menuData[currentWeek][day];
    return `<div class="day-card">
      <div class="day-name">${day}</div>
      <div class="day-meals">
        <div class="meal-slot">
          <div class="meal-label b">☀️ Завтрак</div>
          <select class="meal-select bsel" onchange="setMeal('${day}','breakfast',this.value)">${buildOptions(m.breakfast)}</select>
        </div>
        <div class="meal-slot">
          <div class="meal-label">🍲 Обед</div>
          <select class="meal-select" onchange="setMeal('${day}','lunch',this.value)">${buildOptions(m.lunch)}</select>
        </div>
        <div class="meal-slot" style="margin-bottom:0">
          <div class="meal-label">🌙 Ужин</div>
          <select class="meal-select" onchange="setMeal('${day}','dinner',this.value)">${buildOptions(m.dinner)}</select>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setMeal(day,slot,val){menuData[currentWeek][day][slot]=val;saveToStorage();}
function changeWeek(dir){currentWeek=Math.max(1,Math.min(totalWeeks,currentWeek+dir));renderMenu();}
function catLabel(c){return{breakfast:'Завтрак',soup:'Суп',meat:'Мясо',salad:'Салат',baking:'Выпечка',pasta:'Паста/Крупы',other:'Другое'}[c]||c;}

function renderRecipes(list){
  document.getElementById('recipes-grid').innerHTML=list.map(r=>`
    <div class="rc" onclick="openView(${r.id})">
      <div class="rc-emoji">${r.emoji}</div>
      <div class="rc-info">
        <div class="rc-name">${r.name}</div>
        <div class="rc-meta"><span class="tag ${r.cat}">${catLabel(r.cat)}</span></div>
        <div class="rc-desc">${r.desc}</div>
        <div class="card-btns">
          <button class="cbtn" onclick="event.stopPropagation();openView(${r.id})">📖 Открыть</button>
          <button class="cbtn" onclick="event.stopPropagation();openEdit(${r.id})">✏️ Изменить</button>
          <button class="cbtn d" onclick="event.stopPropagation();delRecipe(${r.id})">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

function filterRecipes(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('filter-cat').value;
  renderRecipes(RECIPES.filter(r=>(!q||r.name.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q))&&(!cat||r.cat===cat)));
}

function openView(id){
  const r=RECIPES.find(x=>x.id===id);if(!r)return;
  currentRecipeId=id;
  document.getElementById('modal-title').textContent=`${r.emoji} ${r.name}`;
  document.getElementById('modal-body').innerHTML=`
    <p style="font-size:11px;color:#888780;margin-bottom:4px">${catLabel(r.cat)}</p>
    <p style="font-size:14px;line-height:1.6;margin-bottom:4px">${r.desc}</p>
    <div class="stitle">Ингредиенты</div>
    <ul class="ilist">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
    <div class="stitle">Приготовление</div>
    <ol class="slist">${r.steps.map(s=>`<li><span>${s}</span></li>`).join('')}</ol>
    <div class="hint">💡 Нажмите «Редактировать» чтобы изменить любой текст, добавить или удалить шаги и ингредиенты</div>
  `;
  document.getElementById('modal-footer').innerHTML=`
    <button class="cancbtn" onclick="closeModal()">Закрыть</button>
    <button class="sbtn" onclick="openEdit(${id})">✏️ Редактировать</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  const r=RECIPES.find(x=>x.id===id);if(!r)return;
  currentRecipeId=id;
  document.getElementById('modal-title').textContent=`✏️ ${r.name}`;
  renderEditForm(r,false);
  document.getElementById('modal').classList.add('open');
}

function openAddRecipe(){
  currentRecipeId=null;
  document.getElementById('modal-title').textContent='➕ Новый рецепт';
  renderEditForm({id:null,name:'',emoji:'🍽',cat:'other',desc:'',ingredients:[''],steps:['']},true);
  document.getElementById('modal').classList.add('open');
}

function renderEditForm(r,isNew){
  document.getElementById('modal-body').innerHTML=`
    <div class="egrid">
      <div>
        <label class="flabel">Эмодзи</label>
        <input class="efield emojif" id="ef-emoji" value="${r.emoji||'🍽'}" maxlength="2">
      </div>
      <div>
        <label class="flabel">Категория</label>
        <select class="efield fsel" id="ef-cat" style="width:100%">
          ${['breakfast','soup','meat','salad','pasta','baking','other'].map(c=>`<option value="${c}"${r.cat===c?' selected':''}>${catLabel(c)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="egrid full" style="margin-bottom:12px">
      <label class="flabel">Название блюда</label>
      <input class="efield" id="ef-name" value="${escHtml(r.name)}" placeholder="Введите название...">
    </div>
    <div class="egrid full" style="margin-bottom:4px">
      <label class="flabel">Описание (короткое)</label>
      <textarea class="efield" id="ef-desc" rows="2" placeholder="Краткое описание блюда...">${escHtml(r.desc)}</textarea>
    </div>

    <div class="stitle">Ингредиенты</div>
    <div id="ef-ing-list">
      ${r.ingredients.map((ing,i)=>`
        <div class="eli" id="eir-${i}">
          <input value="${escHtml(ing)}" id="eif-${i}" placeholder="Ингредиент...">
          <button class="delbtn" onclick="removeEl('eir-${i}')" title="Удалить">×</button>
        </div>`).join('')}
    </div>
    <div class="addrow">
      <input id="ef-new-ing" placeholder="Новый ингредиент...">
      <button class="ardbtn" onclick="addEfIng()">+ Добавить</button>
    </div>

    <div class="stitle">Шаги приготовления</div>
    <div id="ef-step-list">
      ${r.steps.map((s,i)=>`
        <div class="eli" id="esr-${i}">
          <textarea id="esf-${i}" rows="2" placeholder="Шаг приготовления...">${escHtml(s)}</textarea>
          <button class="delbtn" onclick="removeEl('esr-${i}')" title="Удалить">×</button>
        </div>`).join('')}
    </div>
    <div class="addrow">
      <textarea id="ef-new-step" rows="2" placeholder="Новый шаг..."></textarea>
      <button class="ardbtn" onclick="addEfStep()">+ Добавить</button>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML=`
    <button class="cancbtn" onclick="${r.id?`openView(${r.id})`:'closeModal()'}">${r.id?'Отмена':'Закрыть'}</button>
    <button class="sbtn" onclick="saveRecipe(${r.id||'null'})">💾 Сохранить</button>
  `;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function addEfIng(){
  const inp=document.getElementById('ef-new-ing');if(!inp.value.trim())return;
  const list=document.getElementById('ef-ing-list');
  const i=Date.now();
  const div=document.createElement('div');
  div.className='eli';div.id=`eir-${i}`;
  div.innerHTML=`<input value="${escHtml(inp.value.trim())}" id="eif-${i}" placeholder="Ингредиент...">
    <button class="delbtn" onclick="removeEl('eir-${i}')">×</button>`;
  list.appendChild(div);inp.value='';inp.focus();
}
function addEfStep(){
  const ta=document.getElementById('ef-new-step');if(!ta.value.trim())return;
  const list=document.getElementById('ef-step-list');
  const i=Date.now();
  const div=document.createElement('div');
  div.className='eli';div.id=`esr-${i}`;
  div.innerHTML=`<textarea id="esf-${i}" rows="2">${escHtml(ta.value.trim())}</textarea>
    <button class="delbtn" onclick="removeEl('esr-${i}')">×</button>`;
  list.appendChild(div);ta.value='';ta.focus();
}
function removeEl(id){const el=document.getElementById(id);if(el)el.remove();}

function saveRecipe(id){
  const name=document.getElementById('ef-name').value.trim();
  if(!name){alert('Введите название блюда!');return;}
  const emoji=document.getElementById('ef-emoji').value.trim()||'🍽';
  const cat=document.getElementById('ef-cat').value;
  const desc=document.getElementById('ef-desc').value.trim();
  const ings=[];
  document.querySelectorAll('#ef-ing-list .eli input').forEach(inp=>{if(inp.value.trim())ings.push(inp.value.trim());});
  const steps=[];
  document.querySelectorAll('#ef-step-list .eli textarea').forEach(ta=>{if(ta.value.trim())steps.push(ta.value.trim());});

  if(id&&id!=='null'){
    const r=RECIPES.find(x=>x.id===id);
    if(r)Object.assign(r,{name,emoji,cat,desc,ingredients:ings,steps});
  } else {
    const newId=nextId++;
    RECIPES.push({id:newId,name,emoji,cat,desc,ingredients:ings,steps});
    id=newId;
  }
  saveToStorage();
  filterRecipes();
  renderMenu();
  openView(Number(id));
}

function delRecipe(id){
  if(!confirm('Удалить этот рецепт?'))return;
  const idx=RECIPES.findIndex(x=>x.id===id);
  if(idx!==-1)RECIPES.splice(idx,1);
  saveToStorage();
  filterRecipes();renderMenu();
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOnOverlay(e){if(e.target.id==='modal')closeModal();}

function buildShoppingList(){
  showSection('shopping',document.querySelectorAll('.nav-tab')[2]);
  const allMeals=[];
  DAYS.forEach(d=>{
    const m=menuData[currentWeek][d];
    ['breakfast','lunch','dinner'].forEach(s=>{if(m[s])allMeals.push(m[s]);});
  });
  const allIng=[];
  allMeals.forEach(name=>{const r=RECIPES.find(x=>x.name===name);if(r)r.ingredients.forEach(i=>allIng.push(i));});
  const cats={};Object.keys(SHOPPING_DB).forEach(c=>{cats[c]=new Set();});cats['Прочее']=new Set();
  allIng.forEach(ing=>{
    const low=ing.toLowerCase();let found=false;
    Object.entries(SHOPPING_DB).forEach(([c,kws])=>{if(!found&&kws.some(k=>low.includes(k))){cats[c].add(ing);found=true;}});
    if(!found)cats['Прочее'].add(ing);
  });
  const el=document.getElementById('shopping-list-content');
  if(!allMeals.length){el.innerHTML='<p style="color:#888780;font-size:13px">Выберите блюда в меню.</p>';return;}
  let html=`<p style="font-size:13px;color:#27500a;background:#eaf3de;padding:10px 14px;border-radius:9px;margin-bottom:14px">📋 Список для Недели ${currentWeek} · ${allMeals.length} блюд</p>`;
  Object.entries(cats).forEach(([cat,items])=>{
    if(!items.size)return;
    const ck=cat.replace(/\s/g,'_');
    html+=`<div class="shopcat">
      <div class="scathdr">${cat}</div>
      <div class="sitems" id="cat-${ck}">
        ${[...items].map((item,i)=>{const k=`${ck}_${i}`;return`<div class="sitem">
          <input type="checkbox" id="chk-${k}" onchange="toggleItem(this)">
          <label id="lbl-${k}" for="chk-${k}">${item}</label>
        </div>`;}).join('')}
        <div class="asrow">
          <input class="asin" placeholder="Добавить товар..." id="add-${ck}">
          <button class="asbtn" onclick="addShopItem('cat-${ck}','add-${ck}')">+</button>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function toggleItem(cb){document.getElementById(cb.id.replace('chk-','lbl-')).classList.toggle('done',cb.checked);}
function addShopItem(cid,iid){
  const inp=document.getElementById(iid);if(!inp.value.trim())return;
  const c=document.getElementById(cid);const ar=c.querySelector('.asrow');
  const k=`cs_${Date.now()}`;const div=document.createElement('div');
  div.className='sitem';
  div.innerHTML=`<input type="checkbox" id="chk-${k}" onchange="toggleItem(this)"><label id="lbl-${k}" for="chk-${k}">${inp.value.trim()}</label>`;
  c.insertBefore(div,ar);inp.value='';
}
function clearChecked(){document.querySelectorAll('.sitem input[type=checkbox]:checked').forEach(cb=>cb.closest('.sitem').remove());}

function showSection(id,tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  if(tab)tab.classList.add('active');
}

initMenuData();renderMenu();renderRecipes(RECIPES);
</script>
</body>
</html>
